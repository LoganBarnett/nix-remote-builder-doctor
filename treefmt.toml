# treefmt.toml — unified formatter configuration.
# Run `treefmt` to format all files, or `treefmt <file>` for a single file.
# All formatters must be present in PATH (provided by the Nix devShell).

[formatter.rustfmt]
command = "rustfmt"
options = ["--edition", "2021"]
includes = ["*.rs"]

[formatter.alejandra]
command = "alejandra"
includes = ["*.nix"]

# elm-format is intentionally omitted — this project has no Elm
# frontend, and the binary is not in the devShell.

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = ["*.css"]

[formatter.org-fmt]
command = "org-fmt"
options = ["--in-place"]
includes = ["*.org"]
